name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CORE_REPO: tinycld/core
  CORE_REF: main
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: contacts
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
      - name: Install contacts dev tooling
        working-directory: contacts
        run: bun install
      - name: Lint contacts
        working-directory: contacts
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: contacts
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version-file: core/.node-version
      - name: Install core deps (provides types for ~/* imports)
        working-directory: core
        run: bun install
      - name: Install contacts dev tooling
        working-directory: contacts
        run: bun install
      - name: Typecheck contacts
        working-directory: contacts
        run: bun run typecheck

  test:
    name: Unit & E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: contacts
      - uses: actions/checkout@v5
        with:
          repository: ${{ env.CORE_REPO }}
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version-file: core/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: core/server/go.mod
          cache-dependency-path: core/server/go.sum

      - name: Install core deps
        working-directory: core
        run: bun install

      - name: Ensure contacts has no node_modules (siblings must not)
        run: rm -rf contacts/node_modules contacts/bun.lock

      - name: Link contacts into core
        working-directory: core
        run: bun run packages:link @tinycld/contacts ../contacts

      - name: Build PocketBase binary
        working-directory: core/server
        run: go build -o tinycld .

      - name: Run unit tests (vitest picks up contacts via packages glob)
        working-directory: core
        run: bunx vitest run packages/@tinycld/contacts

      - name: Reset test DB
        working-directory: core
        run: bunx tsx scripts/reset-dev-db.ts --url http://127.0.0.1:7091 --data-dir server/pb_test_data

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('core/bun.lock') }}
      - name: Install Playwright browsers
        working-directory: core
        run: bunx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright system deps
        working-directory: core
        run: bunx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Playwright tests (contacts project only)
        working-directory: core
        env:
          CI: true
        run: bunx playwright test --project "@tinycld/contacts"

      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: core/playwright-report/
          retention-days: 14
